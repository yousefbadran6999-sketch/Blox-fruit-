<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Blox Fruits - اللعبة الأسطورية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Cairo', sans-serif;
            overflow: hidden;
        }

        /* حاوية اللعبة */
        .game-container {
            width: 1300px;
            height: 750px;
            background: linear-gradient(145deg, #1a1f2e, #0d1220);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,215,0,0.2), 0 0 0 5px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        /* شاشة تسجيل الدخول */
        .login-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%231a1f2e" fill-opacity="1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') bottom no-repeat, linear-gradient(135deg, #0f172a, #1e1b4b);
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: all 0.5s ease;
        }

        .login-card {
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 50px 60px;
            width: 450px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(255,215,0,0.1);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700, #FF8C00, #FF4500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .logo small {
            font-size: 14px;
            display: block;
            color: #888;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }

        .input-group {
            margin: 20px 0;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #FFD700;
            margin-bottom: 8px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 50px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            color: #1a1a2e;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255,215,0,0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #2c3e66, #1a2a4a);
            color: #FFD700;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .error-msg {
            color: #ff4444;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        /* شاشة اللعبة */
        .game-screen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a3a2a, #0a1a0a);
        }

        /* واجهة اللعبة العلوية */
        .game-ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 25px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 20;
        }

        .player-stats {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 50px;
            border-left: 3px solid #FFD700;
            font-size: 14px;
            color: white;
        }

        .player-stats span {
            color: #FFD700;
            font-weight: bold;
        }

        .online-players {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            color: #aaa;
        }

        /* الشات */
        .chat-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 350px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            z-index: 20;
            pointer-events: auto;
        }

        .chat-messages {
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            font-size: 13px;
            color: #ddd;
        }

        .chat-messages div {
            margin: 5px 0;
            word-break: break-word;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid rgba(255,215,0,0.3);
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            border-radius: 0 0 0 15px;
        }

        .chat-input button {
            padding: 10px 15px;
            background: #FFD700;
            border: none;
            cursor: pointer;
            border-radius: 0 0 15px 0;
        }

        /* قائمة المهارات */
        .skills-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px;
            z-index: 20;
            pointer-events: auto;
            width: 200px;
        }

        .skill-btn {
            background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
            border: 1px solid #FFD700;
            border-radius: 10px;
            padding: 8px;
            margin: 5px 0;
            text-align: center;
            color: #FFD700;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .skill-btn:hover {
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            color: #1a1a2e;
            transform: scale(1.02);
        }

        /* لينك الدعوة */
        .invite-link {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 50px;
            font-size: 12px;
            color: #FFD700;
            cursor: pointer;
            pointer-events: auto;
            z-index: 20;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #FFD700;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- شاشة تسجيل الدخول -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="logo">
                🌌 BLOX FRUITS
                <small>النسخة الأسطورية</small>
            </div>
            <div class="input-group">
                <label>👤 اسم المستخدم</label>
                <input type="text" id="username" placeholder="أدخل اسمك...">
            </div>
            <div class="input-group">
                <label>🔑 كلمة المرور</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn" id="loginBtn">⚡ تسجيل الدخول</button>
            <button class="btn btn-secondary" id="registerBtn">✨ حساب جديد</button>
            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

    <!-- شاشة اللعبة -->
    <div class="game-screen" id="gameScreen">
        <canvas id="gameCanvas"></canvas>
        
        <div class="game-ui">
            <div class="player-stats" id="playerStats">
                🏴‍☠️ المستوى <span id="level">1</span> | ❤️ <span id="hp">100</span>/<span id="maxHp">100</span>
            </div>
            <div class="online-players">
                👥 المتصلون: <span id="onlineCount">1</span>
            </div>
        </div>

        <div class="invite-link" id="inviteLink" onclick="copyInviteLink()">
            🔗 نسخ رابط الدعوة
        </div>

        <div class="skills-panel" id="skillsPanel">
            <div style="text-align:center; margin-bottom:8px;">🍎 المهارات</div>
            <div id="skillsList"></div>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div style="color:#FFD700;">✨ مرحباً بك في اللعبة!</div>
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="اكتب رسالة..." maxlength="100">
                <button id="sendChat">📨</button>
            </div>
        </div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
