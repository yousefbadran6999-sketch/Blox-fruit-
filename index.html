<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>\u2694\ufe0f Ocean Legends - \u0644\u0639\u0628\u0629 \u0627\u0644\u0628\u062d\u0627\u0631 \u0627\u0644\u0623\u0633\u0637\u0648\u0631\u064a\u0629</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f0a500;
    --gold-light: #ffd060;
    --deep: #0a0e1a;
    --ocean: #0d1f3c;
    --surface: #111827;
    --card: #1a2540;
    --border: #2a3a5c;
    --text: #e8eaf0;
    --muted: #8892a4;
    --red: #e53e3e;
    --green: #38a169;
    --blue: #3182ce;
    --purple: #805ad5;
    --cyan: #00b5d8;
    --orange: #dd6b20;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== STARFIELD ===== */
  #stars {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, #0d1f3c 0%, #0a0e1a 100%);
    overflow: hidden;
  }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100%{opacity:0.2;transform:scale(1);}
    50%{opacity:1;transform:scale(1.3);}
  }

  /* ===== SCREENS ===== */
  .screen { display: none; position: relative; z-index: 1; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ===== LOGIN SCREEN ===== */
  #loginScreen {
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-box {
    background: linear-gradient(145deg, #1a2540, #111827);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 100%; max-width: 420px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 40px rgba(240,165,0,0.05);
    animation: floatIn 0.6s ease;
  }
  @keyframes floatIn {
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
  }
  .game-title {
    font-family: 'Cinzel', serif;
    font-size: 2.2rem; font-weight: 900;
    text-align: center;
    background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 5px;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(240,165,0,0.3));
  }
  .game-subtitle {
    text-align: center; color: var(--muted);
    font-size: 0.85rem; margin-bottom: 30px;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .tabs {
    display: flex; border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border); margin-bottom: 25px;
  }
  .tab {
    flex: 1; padding: 10px; text-align: center;
    cursor: pointer; transition: all 0.3s;
    font-size: 0.9rem; font-weight: 600;
    background: transparent; color: var(--muted);
  }
  .tab.active { background: var(--gold); color: #000; }
  .input-group { margin-bottom: 16px; }
  .input-group label {
    display: block; margin-bottom: 6px;
    font-size: 0.85rem; color: var(--muted); font-weight: 600;
  }
  .input-group input, .input-group select {
    width: 100%; padding: 12px 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 0.95rem; font-family: 'Cairo', sans-serif;
    transition: border-color 0.3s;
    outline: none;
  }
  .input-group input:focus, .input-group select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(240,165,0,0.1);
  }
  .input-group select option { background: var(--surface); }
  .btn {
    width: 100%; padding: 13px;
    border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.3s;
    font-family: 'Cairo', sans-serif;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #000;
  }
  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(240,165,0,0.4); }
  .btn-gold:active { transform: translateY(0); }
  .msg { text-align: center; margin-top: 12px; font-size: 0.85rem; min-height: 20px; }
  .msg.error { color: var(--red); }
  .msg.success { color: var(--green); }
  .online-count {
    text-align: center; margin-top: 20px;
    font-size: 0.8rem; color: var(--muted);
  }
  .online-dot {
    display: inline-block; width: 8px; height: 8px;
    background: var(--green); border-radius: 50%;
    margin-left: 5px; animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.4;} }

  /* ===== GAME SCREEN ===== */
  #gameScreen { flex-direction: row; }

  /* Sidebar */
  .sidebar {
    width: 260px; min-height: 100vh;
    background: var(--ocean);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; right: 0; top: 0;
    z-index: 100;
    transition: transform 0.3s;
  }
  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    background: linear
