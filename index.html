<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ Ocean Legends | Blox Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
    :root {
        --gold: #f0a500; --deep: #050810; --ocean: #0d1f3c; --card: #1a2540;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--deep); color: white; overflow: hidden; }

    /* ----- شاشة اختيار الشخصية (Character Select) ----- */
    #selection-screen {
        position: fixed; inset: 0; z-index: 2000;
        background: radial-gradient(circle, var(--ocean), var(--deep));
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .selection-container {
        display: flex; gap: 30px; margin: 40px 0;
    }
    .skin-card {
        width: 180px; height: 260px; background: var(--card); border: 2px solid #2a3a5c;
        border-radius: 20px; cursor: pointer; transition: 0.3s; position: relative;
        overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .skin-card:hover { border-color: var(--gold); transform: translateY(-10px); box-shadow: 0 10px 30px var(--gold); }
    .skin-card.active { border-color: var(--gold); background: rgba(240, 165, 0, 0.1); }
    .skin-img { width: 100px; height: 120px; background: #333; border-radius: 10px; margin-bottom: 15px; }

    /* ----- واجهة اللعبة الأصلية (Typical Blox Fruits UI) ----- */
    #game-ui { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
    #game-ui * { pointer-events: auto; }
    
    .stats-panel { position: fixed; bottom: 20px; right: 20px; width: 300px; background: rgba(0,0,0,0.8); border-radius: 15px; padding: 15px; border-bottom: 4px solid var(--gold); }
    .stat-row { display: flex; justify-content: space-between; margin: 5px 0; font-size: 14px; }
    .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-top: 3px; }
    .progress-fill { height: 100%; width: 50%; transition: 0.3s; }

    /* ----- العالم والبحار ----- */
    #viewport { width: 100vw; height: 100vh; overflow: hidden; }
    #ocean-world {
        position: absolute; width: 15000px; height: 15000px;
        background: #0a162b url('https://www.transparenttextures.com/patterns/dark-matter.png');
    }

    /* الجزيرة */
    .island {
        position: absolute; border-radius: 50%; background: #2d5a27;
        box-shadow: 0 0 50px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
    }

    /* السفينة / اللاعب */
    .player-entity { position: absolute; width: 60px; height: 60px; transition: 0.1s linear; }
    .ship-body { width: 40px; height: 60px; background: #8b4513; border-radius: 50% 50% 10% 10%; border: 3px solid #3e1f08; }
    .admin-glow { box-shadow: 0 0 30px var(--gold); border: 2px solid white !important; }

    /* الأدمن منيو */
    #admin-menu {
        position: fixed; left: 20px; top: 20px; background: rgba(0,0,0,0.9);
        padding: 20px; border-radius: 15px; border-left: 5px solid var(--gold); display: none;
    }
</style>
</head>
<body>

<div id="selection-screen">
    <h1 style="font-family: 'Cinzel'; color: var(--gold); font-size: 3rem;">OCEAN LEGENDS</h1>
    <p>اختر السكن الخاص بك قبل الإبحار</p>
    
    <div class="selection-container">
        <div class="skin-card active" onclick="selectSkin('Pirate', this)">
            <div class="skin-img" style="background: #e53e3e;"></div>
            <b>قبطان القراصنة</b>
        </div>
        <div class="skin-card" onclick="selectSkin('Marine', this)">
            <div class="skin-img" style="background: #3182ce;"></div>
            <b>جندي البحرية</b>
        </div>
        <div class="skin-card" onclick="selectSkin('Admin', this)">
            <div class="skin-img" style="background: gold;"></div>
            <b style="color: gold;">حاكم البحار (أدمن)</b>
            <p style="font-size: 10px;">يتطلب كود الإدارة</p>
        </div>
    </div>

    <input type="text" id="player-name" placeholder="ادخل اسمك..." style="padding: 12px; border-radius: 10px; border: none; width: 250px; text-align: center; margin-bottom: 20px;">
    <input type="password" id="admin-pass" placeholder="كود الأدمن (اختياري)" style="padding: 12px; border-radius: 10px; border: none; width: 250px; text-align: center;">
    
    <button onclick="startGame()" style="margin-top: 30px; padding: 15px 60px; background: var(--gold); border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.2rem;">إبحار (Enter Game)</button>
</div>

<div id="game-ui">
    <div id="admin-menu">
        <h3 style="color: var(--gold);">لوحة التحكم العليا 👑</h3>
        <button onclick="setStat('gold', Infinity)" style="width:100%; margin-top:10px; padding:5px;">ذهب لا نهائي</button>
        <button onclick="setStat('level', 1000)" style="width:100%; margin-top:10px; padding:5px;">ليفل ماكس</button>
        <button onclick="giveFruit('Admin-God')" style="width:100%; margin-top:10px; padding:5px;">فاكهة الأدمن</button>
    </div>

    <div class="stats-panel">
        <div class="stat-row"><span>المستوى:</span> <span id="ui-level">1</span></div>
        <div class="progress-bar"><div id="exp-bar" class="progress-fill" style="background: var(--gold); width: 10%;"></div></div>
        
        <div class="stat-row" style="margin-top:10px;"><span>الصحة (Health):</span> <span id="ui-hp">100/100</span></div>
        <div class="progress-bar"><div id="hp-bar" class="progress-fill" style="background: #e53e3e; width: 100%;"></div></div>

        <div class="stat-row" style="margin-top:10px;"><span>الطاقة (Stamina):</span> <span>500/500</span></div>
        <div class="progress-bar"><div class="progress-fill" style="background: #38a169; width: 100%;"></div></div>
        
        <div style="margin-top:15px; border-top: 1px solid #333; padding-top:10px; color: gold;">
            الذهب: <span id="ui-gold">0</span> $
        </div>
    </div>
</div>

<div id="viewport">
    <div id="ocean-world">
        <div class="island" style="left: 4700px; top: 4700px; width: 600px; height: 600px;">
            <b style="color: white; font-size: 20px;">جزيرة المبتدئين (Spawn)</b>
        </div>
        <div class="island" style="left: 7000px; top: 3000px; width: 800px; height: 800px; background: #4a4a4a;">
            <b style="color: white; font-size: 20px;">جزيرة السجن (Impel Down)</b>
        </div>
    </div>
</div>

<script>
    let player = {
        name: "", skin: "Pirate", level: 1, gold: 0, hp: 100,
        pos: { x: 5000, y: 5000, r: 0 },
        isAdmin: false, speed: 7
    };

    function selectSkin(type, el) {
        player.skin = type;
        document.querySelectorAll('.skin-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    function startGame() {
        player.name = document.getElementById('player-name').value || "بحار";
        const code = document.getElementById('admin-pass').value;

        if(code === "ADMIN777") {
            player.isAdmin = true;
            player.level = "MAX (1000)";
            player.gold = "∞";
            player.speed = 15;
            document.getElementById('admin-menu').style.display = 'block';
        }

        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';

        initPlayer();
        gameLoop();
    }

    function initPlayer() {
        const ship = document.createElement('div');
        ship.id = 'player-ship';
        ship.className = 'player-entity';
        ship.innerHTML = `
            <div style="position:absolute; top:-40px; width:150px; left:-45px; text-align:center; font-weight:bold;">
                ${player.name} <br> <span style="color:cyan; font-size:10px;">Lv. ${player.level}</span>
            </div>
            <div class="ship-body ${player.isAdmin ? 'admin-glow' : ''}"></div>
        `;
        document.getElementById('ocean-world').appendChild(ship);
        updateUI();
    }

    let keys = {};
    window.onkeydown = (e) => keys[e.key] = true;
    window.onkeyup = (e) => keys[e.key] = false;

    function gameLoop() {
        if(keys['w'] || keys['ArrowUp']) {
            player.pos.x += Math.sin(player.pos.r * Math.PI / 180) * player.speed;
            player.pos.y -= Math.cos(player.pos.r * Math.PI / 180) * player.speed;
        }
        if(keys['a'] || keys['ArrowLeft']) player.pos.r -= 4;
        if(keys['d'] || keys['ArrowRight']) player.pos.r += 4;

        // تحديث السفينة والكاميرا
        const ship = document.getElementById('player-ship');
        ship.style.left = player.pos.x + 'px';
        ship.style.top = player.pos.y + 'px';
        ship.querySelector('.ship-body').style.transform = `rotate(${player.pos.r}deg)`;

        const world = document.getElementById('ocean-world');
        world.style.left = (-player.pos.x + window.innerWidth/2) + 'px';
        world.style.top = (-player.pos.y + window.innerHeight/2) + 'px';

        requestAnimationFrame(gameLoop);
    }

    function updateUI() {
        document.getElementById('ui-level').innerText = player.level;
        document.getElementById('ui-gold').innerText = player.gold;
    }

    // أوامر الأدمن
    function setStat(stat, val) { player[stat] = val; updateUI(); }
    function giveFruit(name) { alert("تم تفعيل قوة: " + name); }
</script>

</body>
</html>
