<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ Ocean Legends - النسخة الأسطورية (Admin)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* CSS متقدم جداً للواجهة */
        :root {
            --gold: #f0a500; --gold-l: #ffd060; --deep: #0a0e1a;
            --ocean: #0d1f3c; --surface: #111827; --card: #1a2540;
            --border: #2a3a5c; --text: #e8eaf0; --red: #e53e3e;
            --purple: #805ad5; --cyan: #00b5d8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--deep); color: var(--text); overflow: hidden; }

        /* شاشة التحميل والدخول */
        #auth-screen {
            position: fixed; inset: 0; background: radial-gradient(circle at center, var(--ocean), var(--deep));
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .auth-card {
            background: var(--card); padding: 40px; border-radius: 25px; border: 2px solid var(--border);
            width: 450px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* العالم الافتراضي */
        #game-canvas {
            position: relative; width: 5000px; height: 5000px; 
            background: #0d1f3c url('https://www.transparenttextures.com/patterns/dark-matter.png');
            transition: transform 0.1s linear;
        }

        /* تصميم السفن */
        .ship {
            position: absolute; width: 80px; height: 110px; transition: transform 0.2s;
            display: flex; flex-direction: column; align-items: center;
        }
        .ship-model {
            width: 50px; height: 80px; background: #5d2e0d; border-radius: 50% 50% 10% 10%;
            border: 3px solid #3e1f08; position: relative;
        }
        .admin-ship .ship-model {
            background: linear-gradient(var(--gold), #8c5e00);
            border-color: #fff; box-shadow: 0 0 20px var(--gold);
        }

        /* نظام اللفل والبارات */
        .stats-bar { position: fixed; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 100; }
        .stat-item { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 12px; border-bottom: 3px solid var(--gold); }

        /* لوحة الأدمن الخارقة */
        #admin-mega-menu {
            position: fixed; left: 20px; top: 100px; width: 250px;
            background: rgba(10, 14, 26, 0.95); border: 1px solid var(--gold);
            border-radius: 15px; padding: 15px; display: none; z-index: 1000;
        }
        .admin-btn {
            width: 100%; padding: 10px; margin: 5px 0; background: var(--gold);
            color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        /* تاجر الفواكه */
        .fruit-merchant {
            position: absolute; left: 2500px; top: 2500px; width: 150px; height: 150px;
            background: url('https://cdn-icons-png.flaticon.com/512/3062/3062243.png') no-repeat center;
            background-size: contain; cursor: pointer;
        }

        /* تأثيرات الفواكه */
        .fruit-effect { position: absolute; pointer-events: none; border-radius: 50%; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="font-family: 'Cinzel'; font-size: 3rem; color: var(--gold);">OCEAN LEGENDS</h1>
        <p style="margin-bottom: 20px; color: var(--muted);">ادخل كود الإدارة أو اسم اللاعب</p>
        <input type="text" id="username" placeholder="اسم القبطان..." style="width:100%; padding:15px; background:var(--deep); border:1px solid var(--border); color:white; border-radius:10px;">
        <input type="password" id="admin-pass" placeholder="كود الأدمن (اختياري)..." style="width:100%; padding:15px; background:var(--deep); border:1px solid var(--border); color:white; border-radius:10px; margin-top:10px;">
        <button onclick="bootGame()" style="width:100%; padding:15px; background:var(--gold); border:none; margin-top:20px; font-weight:bold; cursor:pointer; border-radius:10px;">إبحار الآن ⚓</button>
    </div>
</div>

<div class="stats-bar">
    <div class="stat-item">المستوى: <span id="ui-level" style="color:var(--cyan)">1</span></div>
    <div class="stat-item">الذهب: <span id="ui-gold" style="color:var(--gold)">0</span></div>
    <div class="stat-item">الفاكهة: <span id="ui-fruit" style="color:var(--purple)">لا يوجد</span></div>
</div>

<div id="admin-mega-menu">
    <h3 style="text-align:center; color:var(--gold)">لوحة التحكم القصوى 👑</h3>
    <button class="admin-btn" onclick="setAdminMax()">تفعيل الماكس (Max Everything)</button>
    <button class="admin-btn" onclick="spawnFruit('Admin_Fruit')">توليد فاكهة الأدمن</button>
    <button class="admin-btn" onclick="toggleInvisibility()">تفعيل الاختفاء</button>
    <button class="admin-btn" onclick="killAllEnemies()">تدمير جميع الخصوم</button>
    <hr style="margin:10px 0; border:0.5px solid var(--border)">
    <div id="online-list">اللاعبين المتصلين: 0</div>
</div>

<div id="game-canvas">
    <div class="fruit-merchant" onclick="openMerchantMenu()">
        <div style="position:absolute; top:-30px; width:100%; text-align:center; color:gold; font-weight:bold;">تاجر الفواكه الأسطوري</div>
    </div>
</div>

<script>
    // --- متغيرات اللعبة الأساسية ---
    let player = {
        id: null,
        name: "",
        level: 1,
        gold: 100,
        fruit: "لا يوجد",
        pos: { x: 2500, y: 2500, angle: 0 },
        isAdmin: false,
        isInvisible: false
    };

    let players = {};
    let peer, conn;
    const canvas = document.getElementById('game-canvas');

    // --- نظام الفواكه وقدراتها ---
    const FRUITS = {
        "Fire": { color: "#e53e3e", power: "ضربات نارية", rarity: "N" },
        "Ice": { color: "#3182ce", power: "تجميد المحيط", rarity: "R" },
        "Light": { color: "#faf089", power: "سرعة الضوء", rarity: "L" },
        "Admin_Fruit": { color: "#f0a500", power: "قوة الحاكم المطلقة", rarity: "S" }
    };

    // --- تشغيل اللعبة ---
    function bootGame() {
        player.name = document.getElementById('username').value || "بحار";
        const pass = document.getElementById('admin-pass').value;

        // التحقق من صلاحيات الأدمن
        if(pass === "ADMIN777" || player.name === "Admin_Ocean") {
            player.isAdmin = true;
            setAdminMax();
        }

        document.getElementById('auth-screen').style.fadeOut = 500;
        setTimeout(() => {
            document.getElementById('auth-screen').style.display = 'none';
            if(player.isAdmin) document.getElementById('admin-mega-menu').style.display = 'block';
        }, 500);

        initNetworking();
        spawnPlayerShip(player);
        startLoops();
    }

    function setAdminMax() {
        player.level = "MAX (1000)";
        player.gold = "∞ (Infinite)";
        player.fruit = "Admin Fruit (God)";
        updateUI();
    }

    // --- نظام الأونلاين (P2P) ---
    function initNetworking() {
        peer = new Peer();
        peer.on('open', (id) => {
            player.id = id;
            console.log("Your ID: " + id);
        });

        peer.on('connection', (c) => {
            c.on('data', (data) => {
                if(data.type === 'sync') {
                    players[data.id] = data.playerData;
                    renderOtherPlayers();
                }
            });
        });
    }

    // --- الحركة والتحكم ---
    let keys = {};
    window.onkeydown = (e) => keys[e.key] = true;
    window.onkeyup = (e) => keys[e.key] = false;

    function moveLoop() {
        let speed = player.isAdmin ? 15 : 6;
        if(keys['ArrowUp'] || keys['w']) {
            player.pos.x += Math.sin(player.pos.angle * Math.PI / 180) * speed;
            player.pos.y -= Math.cos(player.pos.angle * Math.PI / 180) * speed;
        }
        if(keys['ArrowLeft'] || keys['a']) player.pos.angle -= 4;
        if(keys['ArrowRight'] || keys['d']) player.pos.angle += 4;

        updateCamera();
        updateShipTransform('my-ship', player.pos);
        requestAnimationFrame(moveLoop);
    }

    function updateCamera() {
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        canvas.style.transform = `translate(${-player.pos.x + screenWidth/2}px, ${-player.pos.y + screenHeight/2}px)`;
    }

    // --- وظائف الأدمن ---
    function spawnFruit(type) {
        player.fruit = type;
        updateUI();
        createEffect(player.pos.x, player.pos.y, FRUITS[type].color);
        alert("تم تجهيز: " + FRUITS[type].power);
    }

    function createEffect(x, y, color) {
        const div = document.createElement('div');
        div.className = 'fruit-effect';
        div.style.left = x + 'px'; div.style.top = y + 'px';
        div.style.border = `5px solid ${color}`;
        canvas.appendChild(div);
        setTimeout(() => div.remove(), 1000);
    }

    function updateUI() {
        document.getElementById('ui-level').textContent = player.level;
        document.getElementById('ui-gold').textContent = player.gold;
        document.getElementById('ui-fruit').textContent = player.fruit;
    }

    function spawnPlayerShip(pData) {
        const ship = document.createElement('div');
        ship.id = 'my-ship';
        ship.className = `ship ${player.isAdmin ? 'admin-ship' : ''}`;
        ship.innerHTML = `
            <div style="background:rgba(0,0,0,0.7); padding:2px 10px; border-radius:5px; margin-bottom:5px; white-space:nowrap;">
                ${pData.name} 👑
            </div>
            <div class="ship-model"></div>
        `;
        ship.style.left = pData.pos.x + 'px';
        ship.style.top = pData.pos.y + 'px';
        canvas.appendChild(ship);
    }

    function updateShipTransform(id, pos) {
        const el = document.getElementById(id);
        if(el) {
            el.style.left = pos.x + 'px';
            el.style.top = pos.y + 'px';
            el.querySelector('.ship-model').style.transform = `rotate(${pos.angle}deg)`;
        }
    }

    function startLoops() {
        moveLoop();
        // حلقة التحديث المستمر للأونلاين (وهمي هنا لغرض الكود)
        setInterval(() => {
            if(player.isAdmin) {
                // الأدمن يستطيع رؤية الجميع حتى المختفين
                document.getElementById('online-list').innerHTML = `المتصلين: ${Object.keys(players).length + 1} <br> (أنت الأدمن)`;
            }
        }, 1000);
    }

    function openMerchantMenu() {
        if(player.isAdmin) {
            alert("أهلاً بك يا سيدي الحاكم.. جميع فواكهي تحت أمرك مجاناً!");
            spawnFruit('Admin_Fruit');
        } else {
            alert("تحتاج إلى 1,000,000 ذهب لشراء فاكهة عشوائية!");
        }
    }

</script>
</body>
</html>
